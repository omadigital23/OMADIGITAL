<!DOCTYPE html>
<html>
<head>
    <title>🧪 Test Requête Application Mobile</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .test-container { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin: 15px 0; }
        button { padding: 10px 20px; margin: 5px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; white-space: pre-wrap; }
        .success { border-left: 4px solid #4caf50; }
        .error { border-left: 4px solid #f44336; }
    </style>
</head>
<body>
    <h1>🧪 Test Requête "Application Mobile"</h1>
    
    <div class="test-container">
        <h2>1. Test Direct RAG Search</h2>
        <button onclick="testRAGSearch()">Test Recherche RAG "application mobile"</button>
        <div id="ragResult"></div>
    </div>
    
    <div class="test-container">
        <h2>2. Test Chatbot Complet</h2>
        <button onclick="testChatbot()">Test "j'aimerais commander une application mobile"</button>
        <div id="chatResult"></div>
    </div>
    
    <div class="test-container">
        <h2>3. Test Base de Connaissances</h2>
        <button onclick="testKnowledgeBase()">Vérifier Base de Connaissances</button>
        <div id="kbResult"></div>
    </div>
    
    <script>
        async function testRAGSearch() {
            const resultDiv = document.getElementById('ragResult');
            resultDiv.innerHTML = '🔍 Test recherche RAG...';
            
            try {
                // Test direct de la fonction de recherche (simulé)
                const response = await fetch('/api/chat/gemini-rag', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'application mobile',
                        sessionId: 'test-rag-' + Date.now()
                    })
                });
                
                const data = await response.json();
                
                const hasAppMobileInfo = data.response.includes('mobile') || 
                                       data.response.includes('React Native') || 
                                       data.response.includes('Flutter') ||
                                       data.response.includes('iOS') ||
                                       data.response.includes('Android');
                
                resultDiv.innerHTML = `
                    <div class="result ${hasAppMobileInfo ? 'success' : 'error'}">
📊 Recherche RAG "application mobile":
Status: ${response.status}
Documents trouvés: ${data.documentsUsed || 0}
Source: ${data.source}
Confidence: ${data.confidence}

Réponse:
"${data.response}"

${hasAppMobileInfo ? '✅ INFO APP MOBILE TROUVÉE' : '❌ INFO APP MOBILE MANQUANTE'}
${data.documentsUsed > 0 ? '✅ Documents RAG utilisés' : '❌ Aucun document RAG'}
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Erreur: ${error.message}</div>`;
            }
        }
        
        async function testChatbot() {
            const resultDiv = document.getElementById('chatResult');
            resultDiv.innerHTML = '🤖 Test chatbot complet...';
            
            try {
                const response = await fetch('/api/chat/gemini-rag', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "j'aimerais commander une application mobile",
                        sessionId: 'test-chat-' + Date.now()
                    })
                });
                
                const data = await response.json();
                
                const isGenericError = data.response.includes('problème technique') || 
                                     data.response.includes('technical issue') ||
                                     data.response.includes("n'ai pas cette information");
                
                const hasCorrectInfo = data.response.includes('mobile') ||
                                     data.response.includes('React Native') ||
                                     data.response.includes('développement') ||
                                     data.response.includes('application');
                
                resultDiv.innerHTML = `
                    <div class="result ${hasCorrectInfo && !isGenericError ? 'success' : 'error'}">
🤖 Test Chatbot Complet:
Message: "j'aimerais commander une application mobile"
Documents: ${data.documentsUsed || 0}
Language: ${data.language}
Source: ${data.source}
Error: ${data.error || 'Non'}

Réponse:
"${data.response}"

Suggestions: ${data.suggestions ? data.suggestions.join(', ') : 'Aucune'}

${hasCorrectInfo ? '✅ Réponse pertinente sur apps mobiles' : '❌ Réponse générique'}
${!isGenericError ? '✅ Pas d\'erreur générique' : '❌ Erreur générique détectée'}
${data.documentsUsed > 0 ? '✅ RAG fonctionnel' : '❌ RAG non utilisé'}
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Erreur: ${error.message}</div>`;
            }
        }
        
        async function testKnowledgeBase() {
            const resultDiv = document.getElementById('kbResult');
            resultDiv.innerHTML = '📚 Test base de connaissances...';
            
            // Simulation test base de connaissances via API de debug
            try {
                const response = await fetch('/api/chat/gemini-rag', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'développement applications mobiles React Native Flutter',
                        sessionId: 'test-kb-' + Date.now()
                    })
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result">
📚 Test Base de Connaissances:
Query: "développement applications mobiles React Native Flutter"
Documents RAG: ${data.documentsUsed || 0}
Source: ${data.source}

Réponse:
"${data.response}"

📋 Diagnostic:
${data.documentsUsed > 0 ? '✅ Base de connaissances accessible' : '❌ Base de connaissances inaccessible'}
${data.response.includes('React Native') ? '✅ Contenu React Native trouvé' : '❌ Contenu React Native manquant'}
${data.response.includes('Flutter') ? '✅ Contenu Flutter trouvé' : '❌ Contenu Flutter manquant'}
${data.source === 'gemini-rag' ? '✅ API Gemini-RAG utilisée' : '❌ Fallback utilisé'}

💡 Action: ${data.documentsUsed === 0 ? 'Vérifier migration base de données' : 'RAG fonctionne correctement'}
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Erreur: ${error.message}</div>`;
            }
        }
        
        // Auto-run tests
        setTimeout(() => {
            testKnowledgeBase();
        }, 1000);
    </script>
</body>
</html>
