<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#1d4ed8" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- City Skyline (Dakar) -->
  <rect x="50" y="320" width="30" height="60" fill="#6b7280" opacity="0.7"/>
  <rect x="90" y="300" width="25" height="80" fill="#6b7280" opacity="0.7"/>
  <rect x="125" y="310" width="35" height="70" fill="#6b7280" opacity="0.7"/>
  <rect x="170" y="290" width="28" height="90" fill="#6b7280" opacity="0.7"/>
  <rect x="210" y="305" width="32" height="75" fill="#6b7280" opacity="0.7"/>
  
  <!-- Robot/AI Icon -->
  <g transform="translate(300, 150)">
    <!-- Robot Body -->
    <rect x="-25" y="-20" width="50" height="60" rx="10" fill="url(#robotGradient)"/>
    <!-- Robot Head -->
    <circle cx="0" cy="-35" r="20" fill="url(#robotGradient)"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-38" r="3" fill="#ffffff"/>
    <circle cx="8" cy="-38" r="3" fill="#ffffff"/>
    <circle cx="-8" cy="-38" r="1.5" fill="#f97316"/>
    <circle cx="8" cy="-38" r="1.5" fill="#f97316"/>
    <!-- Antenna -->
    <line x1="0" y1="-55" x2="0" y2="-65" stroke="#f97316" stroke-width="2"/>
    <circle cx="0" cy="-67" r="3" fill="#f97316"/>
    <!-- Arms -->
    <rect x="-35" y="-10" width="10" height="30" rx="5" fill="url(#robotGradient)"/>
    <rect x="25" y="-10" width="10" height="30" rx="5" fill="url(#robotGradient)"/>
    <!-- Legs -->
    <rect x="-15" y="40" width="8" height="25" rx="4" fill="url(#robotGradient)"/>
    <rect x="7" y="40" width="8" height="25" rx="4" fill="url(#robotGradient)"/>
  </g>
  
  <!-- WhatsApp Icon -->
  <g transform="translate(450, 200)">
    <circle cx="0" cy="0" r="25" fill="#25d366"/>
    <path d="M-15,-8 Q-15,-15 -8,-15 L8,-15 Q15,-15 15,-8 L15,8 Q15,15 8,15 L-8,15 Q-15,15 -15,8 Z" fill="#ffffff"/>
    <path d="M-10,-5 L-5,0 L10,-10" stroke="#25d366" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Growth Chart -->
  <g transform="translate(100, 100)">
    <!-- Chart Background -->
    <rect x="0" y="0" width="120" height="80" fill="#ffffff" opacity="0.9" rx="5"/>
    <!-- Chart Bars -->
    <rect x="10" y="60" width="15" height="15" fill="url(#chartGradient)"/>
    <rect x="30" y="50" width="15" height="25" fill="url(#chartGradient)"/>
    <rect x="50" y="35" width="15" height="40" fill="url(#chartGradient)"/>
    <rect x="70" y="20" width="15" height="55" fill="url(#chartGradient)"/>
    <rect x="90" y="10" width="15" height="65" fill="url(#chartGradient)"/>
    <!-- +300% Label -->
    <text x="60" y="-5" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">+300%</text>
  </g>
  
  <!-- Gears (Automation) -->
  <g transform="translate(500, 100)">
    <circle cx="0" cy="0" r="20" fill="#f97316" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="#ffffff"/>
    <circle cx="0" cy="0" r="4" fill="#f97316"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-22" width="4" height="6" fill="#f97316"/>
    <rect x="-2" y="16" width="4" height="6" fill="#f97316"/>
    <rect x="-22" y="-2" width="6" height="4" fill="#f97316"/>
    <rect x="16" y="-2" width="6" height="4" fill="#f97316"/>
  </g>
  
  <g transform="translate(470, 130)">
    <circle cx="0" cy="0" r="15" fill="#ea580c" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
    <circle cx="0" cy="0" r="3" fill="#ea580c"/>
    <!-- Gear teeth -->
    <rect x="-1.5" y="-16" width="3" height="4" fill="#ea580c"/>
    <rect x="-1.5" y="12" width="3" height="4" fill="#ea580c"/>
    <rect x="-16" y="-1.5" width="4" height="3" fill="#ea580c"/>
    <rect x="12" y="-1.5" width="4" height="3" fill="#ea580c"/>
  </g>
  
  <!-- Money/Revenue Icons -->
  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="15" fill="#10b981"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">₣</text>
  </g>
  
  <g transform="translate(430, 280)">
    <circle cx="0" cy="0" r="12" fill="#059669"/>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">₣</text>
  </g>
  
  <g transform="translate(460, 320)">
    <circle cx="0" cy="0" r="10" fill="#047857"/>
    <text x="0" y="3" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">₣</text>
  </g>
  
  <!-- Title -->
  <text x="300" y="50" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Automatisation PME Dakar</text>
  <text x="300" y="75" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="16">+300% de CA avec l'IA</text>
  
  <!-- Connecting Lines (Data Flow) -->
  <path d="M 250 200 Q 300 180 350 200" stroke="#f97316" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <path d="M 350 220 Q 400 240 450 220" stroke="#10b981" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>