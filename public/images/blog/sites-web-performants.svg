<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="websiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#f8fafc" />
    </linearGradient>
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="50%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#ef4444" />
    </linearGradient>
    <linearGradient id="googleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4" />
      <stop offset="25%" style="stop-color:#ea4335" />
      <stop offset="50%" style="stop-color:#fbbc04" />
      <stop offset="100%" style="stop-color:#34a853" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Main Website Mockup -->
  <g transform="translate(300, 200)">
    <!-- Browser Window -->
    <rect x="-120" y="-80" width="240" height="160" rx="8" fill="url(#websiteGradient)" stroke="#e5e7eb" stroke-width="2"/>
    <!-- Browser Header -->
    <rect x="-120" y="-80" width="240" height="25" rx="8" fill="#f3f4f6"/>
    <rect x="-120" y="-63" width="240" height="8" fill="#f3f4f6"/>
    <!-- Browser Buttons -->
    <circle cx="-105" cy="-67" r="3" fill="#ef4444"/>
    <circle cx="-95" cy="-67" r="3" fill="#f59e0b"/>
    <circle cx="-85" cy="-67" r="3" fill="#10b981"/>
    <!-- URL Bar -->
    <rect x="-70" y="-72" width="180" height="12" rx="6" fill="#ffffff" stroke="#d1d5db"/>
    <text x="-65" y="-63" fill="#6b7280" font-family="Arial, sans-serif" font-size="8">https://pme-senegal.com</text>
    
    <!-- Website Content -->
    <!-- Header -->
    <rect x="-110" y="-50" width="220" height="20" fill="#f97316"/>
    <text x="0" y="-37" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">PME SÉNÉGAL</text>
    
    <!-- Navigation -->
    <rect x="-110" y="-30" width="220" height="12" fill="#fed7aa"/>
    <rect x="-100" y="-27" width="30" height="6" fill="#f97316"/>
    <rect x="-65" y="-27" width="25" height="6" fill="#f97316"/>
    <rect x="-35" y="-27" width="35" height="6" fill="#f97316"/>
    <rect x="5" y="-27" width="30" height="6" fill="#f97316"/>
    
    <!-- Content Area -->
    <rect x="-110" y="-15" width="140" height="80" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="-105" y="-10" width="130" height="15" fill="#f97316" opacity="0.2"/>
    <rect x="-105" y="8" width="80" height="4" fill="#d1d5db"/>
    <rect x="-105" y="15" width="100" height="4" fill="#d1d5db"/>
    <rect x="-105" y="22" width="60" height="4" fill="#d1d5db"/>
    
    <!-- Sidebar -->
    <rect x="35" y="-15" width="65" height="80" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="40" y="-10" width="55" height="8" fill="#10b981"/>
    <rect x="40" y="2" width="55" height="6" fill="#e5e7eb"/>
    <rect x="40" y="12" width="55" height="6" fill="#e5e7eb"/>
    
    <!-- Speed Indicator -->
    <circle cx="80" cy="-60" r="15" fill="#10b981"/>
    <text x="80" y="-55" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="8" font-weight="bold">0.8s</text>
  </g>
  
  <!-- Google Search Results -->
  <g transform="translate(100, 120)">
    <!-- Google Logo -->
    <text x="0" y="0" fill="url(#googleGradient)" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Google</text>
    
    <!-- Search Results -->
    <rect x="0" y="10" width="150" height="80" fill="#ffffff" stroke="#e5e7eb" rx="4"/>
    
    <!-- Result 1 (Top position) -->
    <rect x="5" y="15" width="140" height="20" fill="#e6fffa" stroke="#10b981" stroke-width="2" rx="2"/>
    <text x="8" y="22" fill="#1f2937" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Restaurant Chez Fatou - Dakar</text>
    <text x="8" y="30" fill="#059669" font-family="Arial, sans-serif" font-size="6">Position #1 - 8,500 visiteurs/mois</text>
    
    <!-- Result 2 -->
    <rect x="5" y="38" width="140" height="18" fill="#f9fafb" rx="2"/>
    <text x="8" y="45" fill="#1f2937" font-family="Arial, sans-serif" font-size="7">Boutique Elegance Dakar</text>
    <text x="8" y="52" fill="#6b7280" font-family="Arial, sans-serif" font-size="6">Position #2 - Mode & Accessoires</text>
    
    <!-- Result 3 -->
    <rect x="5" y="58" width="140" height="18" fill="#f9fafb" rx="2"/>
    <text x="8" y="65" fill="#1f2937" font-family="Arial, sans-serif" font-size="7">Déco Sénégal - Décoration</text>
    <text x="8" y="72" fill="#6b7280" font-family="Arial, sans-serif" font-size="6">Position #3 - +1200% leads</text>
  </g>
  
  <!-- Performance Metrics -->
  <g transform="translate(450, 150)">
    <!-- Speed Gauge -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#e5e7eb" stroke-width="6"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#speedGradient)" stroke-width="6" 
            stroke-dasharray="150" stroke-dashoffset="30" stroke-linecap="round"/>
    <text x="0" y="-5" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">98</text>
    <text x="0" y="8" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="8">Score</text>
    
    <!-- Metrics -->
    <rect x="-40" y="40" width="80" height="60" fill="#ffffff" stroke="#e5e7eb" rx="4"/>
    <text x="0" y="52" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Core Web Vitals</text>
    
    <rect x="-35" y="58" width="20" height="8" fill="#10b981" rx="2"/>
    <text x="-25" y="64" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="6">LCP</text>
    
    <rect x="-10" y="58" width="20" height="8" fill="#10b981" rx="2"/>
    <text x="0" y="64" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="6">FID</text>
    
    <rect x="15" y="58" width="20" height="8" fill="#10b981" rx="2"/>
    <text x="25" y="64" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="6">CLS</text>
    
    <text x="0" y="78" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Tous VERTS ✓</text>
    
    <text x="0" y="92" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10" font-weight="bold">+800% ROI</text>
  </g>
  
  <!-- Mobile Device -->
  <g transform="translate(150, 300)">
    <rect x="-20" y="-40" width="40" height="80" rx="8" fill="#1f2937"/>
    <rect x="-17" y="-35" width="34" height="60" rx="2" fill="#ffffff"/>
    <circle cx="0" cy="35" r="5" fill="#374151"/>
    
    <!-- Mobile Website -->
    <rect x="-15" y="-33" width="30" height="8" fill="#f97316"/>
    <rect x="-13" y="-22" width="26" height="3" fill="#e5e7eb"/>
    <rect x="-13" y="-17" width="20" height="3" fill="#e5e7eb"/>
    <rect x="-13" y="-12" width="26" height="3" fill="#e5e7eb"/>
    <rect x="-13" y="-5" width="26" height="12" fill="#fed7aa"/>
    <rect x="-13" y="10" width="12" height="8" fill="#10b981"/>
    <rect x="1" y="10" width="12" height="8" fill="#3b82f6"/>
    
    <!-- Mobile Speed -->
    <circle cx="12" cy="-30" r="6" fill="#10b981"/>
    <text x="12" y="-27" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="6">Fast</text>
  </g>
  
  <!-- SEO Elements -->
  <g transform="translate(500, 300)">
    <!-- SEO Badge -->
    <circle cx="0" cy="0" r="20" fill="#4f46e5"/>
    <text x="0" y="-3" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SEO</text>
    <text x="0" y="6" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="8">100%</text>
    
    <!-- Keywords -->
    <rect x="-30" y="25" width="60" height="25" fill="#ffffff" stroke="#e5e7eb" rx="4"/>
    <text x="0" y="33" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="6">restaurant dakar</text>
    <text x="0" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="6">pme sénégal</text>
    <text x="0" y="47" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="6">site web dakar</text>
  </g>
  
  <!-- Technology Stack -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="80" height="100" fill="#ffffff" stroke="#e5e7eb" rx="4"/>
    <text x="40" y="12" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Tech Stack</text>
    
    <!-- Next.js -->
    <rect x="5" y="18" width="70" height="12" fill="#000000" rx="2"/>
    <text x="40" y="26" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="7">Next.js 14</text>
    
    <!-- Vercel -->
    <rect x="5" y="33" width="70" height="12" fill="#000000" rx="2"/>
    <text x="40" y="41" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="7">Vercel Edge</text>
    
    <!-- WebP -->
    <rect x="5" y="48" width="70" height="12" fill="#10b981" rx="2"/>
    <text x="40" y="56" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="7">WebP/AVIF</text>
    
    <!-- CDN -->
    <rect x="5" y="63" width="70" height="12" fill="#3b82f6" rx="2"/>
    <text x="40" y="71" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="7">CDN Global</text>
    
    <!-- Schema -->
    <rect x="5" y="78" width="70" height="12" fill="#f59e0b" rx="2"/>
    <text x="40" y="86" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="7">Schema.org</text>
  </g>
  
  <!-- Loading Speed Comparison -->
  <g transform="translate(400, 50)">
    <text x="0" y="0" fill="#1f2937" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Avant vs Après</text>
    
    <!-- Before -->
    <rect x="-20" y="10" width="15" height="30" fill="#ef4444"/>
    <text x="-12" y="50" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="8">8.3s</text>
    <text x="-12" y="60" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="6">Avant</text>
    
    <!-- After -->
    <rect x="10" y="35" width="15" height="5" fill="#10b981"/>
    <text x="17" y="50" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="8">0.8s</text>
    <text x="17" y="60" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="6">Après</text>
    
    <!-- Arrow -->
    <path d="M -2 25 L 8 25" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Sites Web Ultra-Performants</text>
  <text x="300" y="50" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="14">PME Sénégalaises qui Dominent Google</text>
  
  <!-- Floating Performance Indicators -->
  <g opacity="0.6">
    <circle cx="80" cy="80" r="2" fill="#10b981">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="80" r="2" fill="#3b82f6">
      <animate attributeName="r" values="2;3;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="380" r="2" fill="#f59e0b">
      <animate attributeName="r" values="2;3.5;2" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>